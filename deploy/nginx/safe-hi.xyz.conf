# safe-hi.xyz / api.safe-hi.xyz nginx vhost
#
# 목적:
# - 기존 safehi.world 설정과 겹치지 않게 별도 server_name 으로 추가
# - api.safe-hi.xyz -> core_backend_system(4100)
# - safe-hi.xyz(및 www) / dashboard.safe-hi.xyz -> 프론트엔드(예: 3000)

upstream safe_hi_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream safe_hi_core_api {
    server 127.0.0.1:4100;
    keepalive 32;
}

# HTTP -> HTTPS 리다이렉트
server {
    listen 80;
    listen [::]:80;
    server_name safe-hi.xyz www.safe-hi.xyz dashboard.safe-hi.xyz api.safe-hi.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Frontend: safe-hi.xyz + dashboard.safe-hi.xyz
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name safe-hi.xyz www.safe-hi.xyz dashboard.safe-hi.xyz;

    # certbot 적용 후 경로 자동 반영 가능
    ssl_certificate /etc/letsencrypt/live/safe-hi.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/safe-hi.xyz/privkey.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass http://safe_hi_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Backend API: api.safe-hi.xyz
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.safe-hi.xyz;

    ssl_certificate /etc/letsencrypt/live/safe-hi.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/safe-hi.xyz/privkey.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass http://safe_hi_core_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
