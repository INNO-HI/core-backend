version: '3.8'
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: safe_hi
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  ai_dummy:
    build:
      context: ./core_backend_system/ai_dummy_server
    ports:
      - "5000:5000"
    restart: unless-stopped

  core:
    build:
      context: .
      dockerfile: core_backend_system/Dockerfile
    ports:
      - "4100:4100"
    env_file:
      - ./core_backend_system/.env
    depends_on:
      - db
      - ai_dummy
    restart: unless-stopped

volumes:
  db_data:
